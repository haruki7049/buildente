name: Publish to Codeberg Maven

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: codeberg-small

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "zulu"
          java-package: jdk
          cache: gradle

      - name: Resolve version
        id: version
        run: |
          # Use tag name if triggered by a tag, otherwise use commit hash
          if [[ "${FORGEJO_REF}" == refs/tags/* ]]; then
            echo "value=${FORGEJO_REF#refs/tags/}" >> "$FORGEJO_OUTPUT"
          else
            echo "value=${FORGEJO_SHA}" >> "$FORGEJO_OUTPUT"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to Codeberg Maven
        run: ./gradlew publish --no-daemon
        env:
          CODEBERG_USERNAME: haruki7049
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          PROJECT_VERSION: ${{ steps.version.outputs.value }}
